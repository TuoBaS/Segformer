# ============================================================
# SegFormer-B4 配置 (ADE20K, 512x512, 160K iterations)
# 大型变体: 62.6M 参数
# 官方 mIoU (ss): 47.8%  |  mIoU (ms+flip): 49.2%
# ============================================================
_base_: configs/_base_.yaml

model:
  variant: b4
  img_size: 512
  num_classes: 150
  encoder_pretrained: true

  # MiT-B4 编码器参数 (对齐官方 mit_b4)
  # 与 B3 的区别: depths 从 [3,4,18,3] → [3,8,27,3] (Stage 2/3 加深)
  encoder:
    embed_dims: [64, 128, 320, 512]
    num_heads: [1, 2, 5, 8]
    depths: [3, 8, 27, 3]
    sr_ratios: [8, 4, 2, 1]
    mlp_ratios: [4, 4, 4, 4]
    drop_path_rate: 0.1

  # All-MLP Decoder 参数
  decoder:
    decoder_dim: 768
    dropout_ratio: 0.1

data:
  train:
    img_dir: data/ADEChallengeData2016/images/training
    mask_dir: data/ADEChallengeData2016/annotations/training
  val:
    img_dir: data/ADEChallengeData2016/images/validation
    mask_dir: data/ADEChallengeData2016/annotations/validation
  batch_size: 2
  num_workers: 4
  crop_size: 512
  reduce_zero_label: true
