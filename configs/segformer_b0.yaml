# ============================================================
# SegFormer-B0 配置 (ADE20K, 512x512, 427K iterations, batch=6, AMP)
# 最轻量变体: 3.7M 参数
# 官方 mIoU (ss): 37.4%  |  mIoU (ms+flip): 38.8%
# ============================================================
_base_: _base_.yaml

model:
  variant: b0
  img_size: 512
  num_classes: 150               # ADE20K: 150 类
  encoder_pretrained: true

  # MiT-B0 编码器参数 (对齐官方 mit_b0)
  encoder:
    embed_dims: [32, 64, 160, 256]
    num_heads: [1, 2, 5, 8]
    depths: [2, 2, 2, 2]
    sr_ratios: [8, 4, 2, 1]
    mlp_ratios: [4, 4, 4, 4]
    drop_path_rate: 0.1

  # All-MLP Decoder 参数
  decoder:
    decoder_dim: 256             # B0/B1 使用 256
    dropout_ratio: 0.1

data:
  train:
    img_dir: data/ADEChallengeData2016/images/training
    mask_dir: data/ADEChallengeData2016/annotations/training
  val:
    img_dir: data/ADEChallengeData2016/images/validation
    mask_dir: data/ADEChallengeData2016/annotations/validation
  batch_size: 6                  # A100 (40GB), 官方 per-GPU=2 × 8 GPUs = 有效 batch 16
  num_workers: 4
  crop_size: 512
  reduce_zero_label: true
