_base_: segformer_b0.yaml

work_dir: checkpoints/b0_lcar_edge

model:
  variant: b0_lcar_edge
  decoder:
    context_gate: true
    context_reduction: 4
    refine: true
    refine_dilations: [1, 3, 5]
    edge_head: true

loss:
  edge_aux:
    enabled: true
    weight: 0.2
    kernel_size: 3
    pos_weight: 3.0
